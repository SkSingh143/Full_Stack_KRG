<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>
</head>

<body>

<div>
<h1>Expense Tracker</h1>
<p>A App where you can add , delete , update and see total expense</p>
</div>

<div>

<label>Expense Name</label>
<input type="text" id="expenseName">

<label>Amount</label>
<input type="number" id="expenseInput">

<label>Category</label>
<select id="expenseCategory">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
</select>

<button id="addExpense">Add Expense</button>

</div>

<h3>Recent Expense</h3>

<div id="expenseList"></div>

<h3 id="expenseTotal"></h3>

<script src="logic.js"></script>

</body>
</html>
